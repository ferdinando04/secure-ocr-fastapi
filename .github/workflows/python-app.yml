name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libmagic1
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Check compilation
      run: python -m compileall app tests
        
    - name: Run tests
      env:
        # Configuración específica para CI
        API_KEY: "dummy-key-for-testing-purposes-only-32-chars"
        ALLOWED_ORIGINS: '["http://localhost:3000"]'
        TMP_DIR: "/tmp/ocr_service"
      run: |
        mkdir -p /tmp/ocr_service
        pytest tests/
